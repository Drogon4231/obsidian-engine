name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  py-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check --select E,F,W --ignore E501,E402 --exclude remotion .

  ts-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install dependencies
        working-directory: remotion
        run: npm ci

      - name: Create runtime JSON stubs for tsc
        working-directory: remotion
        run: |
          echo '{"total_duration_seconds":1,"scenes":[],"word_timestamps":[],"audio_file":"","captions_words":[]}' > src/video-data.json
          echo '{"total_duration_seconds":1,"scenes":[],"word_timestamps":[],"audio_file":"","captions_words":[]}' > src/short-video-data.json

      - name: Lint and typecheck
        working-directory: remotion
        run: npm run lint

  py-test:
    runs-on: ubuntu-latest
    needs: py-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run tests with coverage
        env:
          SUPABASE_URL: "https://fake.supabase.co"
          SUPABASE_KEY: "fake-key"
          ANTHROPIC_API_KEY: "fake-key"
          ELEVENLABS_API_KEY: "fake-key"
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=26

      - name: Import check
        env:
          SUPABASE_URL: "https://fake.supabase.co"
          SUPABASE_KEY: "fake-key"
          ANTHROPIC_API_KEY: "fake-key"
          ELEVENLABS_API_KEY: "fake-key"
        run: |
          python -c "from server.webhook_server import app; print('webhook_server OK')"
          python -c "from server.notifier import notify; print('notifier OK')"
          python -c "from core.pipeline_config import SCORING_THRESHOLDS; print('pipeline_config OK')"
          python -c "from media.music_manager import get_music_for_video; print('music_manager OK')"
          python -c "from core.pipeline_config import SCORING_THRESHOLDS; assert len(SCORING_THRESHOLDS) >= 28, f'Expected 28+ thresholds, got {len(SCORING_THRESHOLDS)}'; print(f'SCORING_THRESHOLDS OK ({len(SCORING_THRESHOLDS)} thresholds)')"

  ts-test:
    runs-on: ubuntu-latest
    needs: ts-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install dependencies
        working-directory: remotion
        run: npm ci

      - name: Run tests
        working-directory: remotion
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: [py-test, ts-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t obsidian-archive:latest .
